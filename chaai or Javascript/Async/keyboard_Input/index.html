<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Listener</title>
    <style>
        body{background-color: #090909; color:white;}
        #content{font-family: 'Times New Roman', Times, serif; 
            position:absolute;
            top:45%;
            left:45%;
        }
        table{
            border:1px solid white;
            border-radius:4px;
            padding:8px;
            border-collapse: separate; 
            border-spacing: 4px; 
        }
        th,td{
            padding:4px;
            border:1px solid white;
            border-radius:5px;
        }


    </style>
</head>
<body>
    <div id="content">
        <p>Press any Key</p>
    </div>
</body>
<script src="keyPress.js"></script>
</html>
