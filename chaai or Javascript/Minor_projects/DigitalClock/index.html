<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body{
            background-color: #222;
            color:lightgray;
        }
        #header{
            text-align: center;
        }
        #clock{
            border:2px solid gray;
            border-radius:5px;
            text-align: center;
            position:relative;
            left:37%;
            font-size: 30px;
            color:#333;
            padding:4px 10px;
            width:fit-content;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <p id="header">Digital Clock(Your local time)</p><br>
    <div id="clock"></div>
</body>
<script src="clock.js"></script>
</html>
